<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чистая P2P Игра без Серверов</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: #fff; margin: 0; padding: 10px; }
        .box { background: #333; padding: 15px; border-radius: 8px; max-width: 420px; margin: 10px auto; box-shadow: 0 4px 6px rgba(0,0,0,0.3); box-sizing: border-box; }
        canvas { background: #111; border: 2px solid #555; display: block; margin: 10px auto; max-width: 100%; border-radius: 4px; }
        button { padding: 12px; width: 100%; background: #28a745; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 15px; margin: 5px 0; }
        button.blue { background: #007bff; }
        input { padding: 12px; width: 100%; box-sizing: border-box; margin-bottom: 10px; border-radius: 4px; border: 1px solid #555; background: #444; color: #fff; }
        .status { color: #caa; font-size: 14px; margin-top: 5px; font-style: italic; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h2>🎮 Чистая P2P Игра (Без Серверов)</h2>

    <!-- Шаг 1: Главное меню -->
    <div id="setup-panel" class="box">
        <button class="blue" onclick="startAsHost()">1. Создать комнату (Я Хост)</button>
        <p class="status">Создайте сессию и отправьте ссылку другу</p>
    </div>

    <!-- Обмен ссылками -->
    <div id="exchange-panel" class="box hidden">
        <h3 id="exchange-title">Настройка связи</h3>
        <p id="exchange-instruction" style="font-size: 14px; color: #ccc;"></p>
        <div id="host-input-container" class="hidden">
            <input type="text" id="client-link-input" placeholder="Вставьте ответную ссылку от друга">
            <button onclick="connectToClient()">3. Подключить игрока</button>
        </div>
        <div class="status" id="exchange-status"></div>
    </div>

    <!-- Игровой холст -->
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <p style="color: #aaa; font-size: 14px;">Управление: Кликайте или тапайте по полю, чтобы переместить свой квадрат.</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Данные игроков
        let myPlayer = { x: 50, y: 200, color: '#007bff', size: 30 };
        let enemyPlayer = { x: 320, y: 200, color: '#dc3545', size: 30, active: false };

        // Инициализируем чистое WebRTC подключение без серверов
        let pc = new RTCPeerConnection({ iceServers: [] }); 
        let dataChannel = null;

        // Кодирование данных для упаковки в URL (Base64)
        function pack(obj) {
            const bytes = new TextEncoder().encode(JSON.stringify(obj));
            return btoa(String.fromCharCode.apply(null, bytes))
                .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }

        function unpack(str) {
            str = str.replace(/-/g, '+').replace(/_/g, '/');
            while (str.length % 4) str += '=';
            const binary = atob(str);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            return JSON.parse(new TextDecoder().decode(bytes));
        }

        // Автоматически проверяем URL при открытии страницы
        const urlParams = new URLSearchParams(window.location.search);
        const incomingOffer = urlParams.get('offer');

        if (incomingOffer) {
            // Если в ссылке есть 'offer', значит зашел КЛИЕНТ
            document.getElementById('setup-panel').classList.add('hidden');
            startAsClient(incomingOffer);
        }

        // --- ЛОГИКА ХОСТА ---
        async function startAsHost() {
            document.getElementById('setup-role')?.classList.add('hidden');
            document.getElementById('setup-panel').classList.add('hidden');
            
            // Создаем канал данных
            dataChannel = pc.createDataChannel("game-channel");
            setupDataChannel();

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            // Собираем локальные сетевые параметры
            pc.onicecandidate = (event) => {
                if (event.candidate === null) {
                    const compressedOffer = pack(pc.localDescription);
                    const inviteLink = `${window.location.origin}${window.location.pathname}?offer=${compressedOffer}`;
                    
                    document.getElementById('exchange-panel').classList.remove('hidden');
                    document.getElementById('exchange-title').innerText = "Шаг 1: Приглашение";
                    document.getElementById('exchange-instruction').innerText = "Ссылка скопирована! Отправьте её другу. Когда он перейдет по ней, он скинет вам ответную ссылку — вставьте её ниже:";
                    document.getElementById('host-input-container').classList.remove('hidden');

                    navigator.clipboard.writeText(inviteLink);
                    document.getElementById('exchange-status').innerText = "📋 Ссылка-приглашение скопирована в буфер!";
                }
            };
        }

        function connectToClient() {
            const inputVal = document.getElementById('client-link-input').value.trim();
            if (!inputVal) return alert("Вставьте ссылку от друга!");
            
            try {
                let answerStr = inputVal;
                if (inputVal.includes('answer=')) {
                    const url = new URL(inputVal);
                    answerStr = url.searchParams.get('answer');
                }
                const answer = unpack(answerStr);
                pc.setRemoteDescription(new RTCSessionDescription(answer));
                document.getElementById('exchange-status').innerText = "Синхронизация соединения...";
            } catch(e) {
                alert("Ошибка чтения ссылки. Убедитесь, что скопировали её целиком.");
            }
        }

        // --- ЛОГИКА КЛИЕНТА ---
        async function startAsClient(offerStr) {
            // Клиент подхватывает канал, созданный хостом
            pc.ondatachannel = (event) => {
                dataChannel = event.channel;
                setupDataChannel();
            };

            // Переключаем цвета для баланса визуализации
            myPlayer.color = '#dc3545';
            enemyPlayer.color = '#007bff';

            const offer = unpack(offerStr);
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);

            pc.onicecandidate = (event) => {
                if (event.candidate === null) {
                    const compressedAnswer = pack(pc.localDescription);
                    const responseLink = `${window.location.origin}${window.location.pathname}?answer=${compressedAnswer}`;
                    
                    document.getElementById('exchange-panel').classList.remove('hidden');
                    document.getElementById('exchange-title').innerText = "Шаг 2: Ответ";
                    document.getElementById('exchange-instruction').innerText = "Ответная ссылка скопирована! Отправьте её обратно другу (Хосту) в мессенджер, чтобы игра началась.";
                    
                    navigator.clipboard.writeText(responseLink);
                    document.getElementById('exchange-status').innerText = "📋 Ответная ссылка скопирована в буфер!";
                }
            };
        }

        // --- ИГРОВОЙ КАНАЛ СВЯЗИ ---
        function setupDataChannel() {
            dataChannel.onopen = () => {
                // Скрываем все меню настройки, открываем игру
                document.getElementById('exchange-panel').classList.add('hidden');
                enemyPlayer.active = true;
                sendMyPosition();
            };

            dataChannel.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'MOVE') {
                    enemyPlayer.x = data.x;
                    enemyPlayer.y = data.y;
                }
            };

            dataChannel.onclose = () => {
                enemyPlayer.active = false;
                alert("Игрок отключился.");
            };
        }

        function sendMyPosition() {
            if (dataChannel && dataChannel.readyState === "open") {
                dataChannel.send(JSON.stringify({
                    type: 'MOVE',
                    x: myPlayer.x,
                    y: myPlayer.y
                }));
            }
        }

        // --- РЕНДЕР И НАЖАТИЯ ---
        function moveHandler(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            myPlayer.x = ((clientX - rect.left) / rect.width) * canvas.width - myPlayer.size / 2;
            myPlayer.y = ((clientY - rect.top) / rect.height) * canvas.height - myPlayer.size / 2;
            sendMyPosition();
        }

        canvas.addEventListener('click', (e) => moveHandler(e.clientX, e.clientY));
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            moveHandler(touch.clientX, touch.clientY);
        }, { passive: false });

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Рисуем игрока
            ctx.fillStyle = myPlayer.color;
            ctx.fillRect(myPlayer.x, myPlayer.y, myPlayer.size, myPlayer.size);

            // Рисуем соперника
            if (enemyPlayer.active) {
                ctx.fillStyle = enemyPlayer.color;
                ctx.fillRect(enemyPlayer.x, enemyPlayer.y, enemyPlayer.size, enemyPlayer.size);
            } else {
                ctx.fillStyle = "#666";ctx.font = "15px sans-serif";ctx.fillText("Ожидание настройки P2P связи...", 80, 200);}requestAnimationFrame(gameLoop);}gameLoop();
