<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Отладка игры</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: #fff; margin: 0; padding: 10px; }
        .box { background: #333; padding: 15px; border-radius: 8px; max-width: 420px; margin: 10px auto; box-shadow: 0 4px 6px rgba(0,0,0,0.3); box-sizing: border-box; }
        canvas { background: #111; border: 2px solid #555; display: block; margin: 10px auto; max-width: 100%; border-radius: 4px; }
        button { padding: 12px; width: 100%; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 15px; margin: 5px 0; }
        input, textarea { padding: 12px; width: 100%; box-sizing: border-box; margin-bottom: 10px; border-radius: 4px; border: 1px solid #555; background: #444; color: #fff; }
        .hidden { display: none; }
        /* Стили для окна логов */
        #debug-log { background: #000; color: #0f0; font-family: monospace; text-align: left; font-size: 11px; padding: 10px; height: 120px; overflow-y: scroll; border: 1px solid #333; border-radius: 4px; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>⚡ P2P Игра с Отладкой</h2>

    <!-- Окно отладки (Видно всегда) -->
    <div class="box" style="border: 1px solid #555;">
        <strong style="color: #0f0;">Окно системных логов:</strong>
        <div id="debug-log">Скрипт загружен. Ожидание действий...</div>
    </div>

    <!-- Шаг 1: Главное меню -->
    <div id="setup-panel" class="box">
        <button onclick="startAsHost()">1. Создать комнату (Я Хост)</button>
    </div>

    <!-- Обмен ссылками -->
    <div id="exchange-panel" class="box hidden">
        <p style="font-size: 13px; color: #ffc107; margin: 5px 0;">Скопируйте этот текст и отправьте другу:</p>
        <textarea id="output-link-text" readonly onclick="this.select()"></textarea>
        
        <div id="host-input-container" class="hidden" style="margin-top: 15px; border-top: 1px solid #555; padding-top: 15px;">
            <p style="font-size: 13px; color: #28a745; margin: 5px 0;">Вставьте ответную ссылку друга:</p>
            <input type="text" id="client-link-input" placeholder="Вставьте ответную ссылку сюда">
            <button style="background:#28a745;" onclick="connectToClient()">3. Подключить игрока</button>
        </div>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>
        <script>
        const logDiv = document.getElementById('debug-log');
        
        // Функция вывода текста на экран телефона
        function debugLog(text, isError = false) {
            const time = new Date().toLocaleTimeString();
            const color = isError ? 'color: #ff4d4d;' : '';
            logDiv.innerHTML += `<div style="${color}">[${time}] ${text}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(text);
        }

        // Перехватываем вообще все глобальные ошибки на странице
        window.onerror = function(message, source, lineno, colno, error) {
            debugLog(`КРИТИЧЕСКАЯ ОШИБКА: ${message} (Строка: ${lineno})`, true);
            return false;
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let myPlayer = { x: 50, y: 200, color: '#007bff', size: 30 };
        let enemyPlayer = { x: 320, y: 200, color: '#dc3545', size: 30, active: false };

        let pc = null;
        let dataChannel = null;

        // Безопасная инициализация WebRTC
        try {
            debugLog("Проверка поддержки WebRTC в браузере...");
            if (!window.RTCPeerConnection) {
                throw new Error("WebRTC НЕ поддерживается этим браузером/телефоном!");
            }
            
            pc = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:://google.com' }]
            });
            debugLog("Объект RTCPeerConnection успешно создан.");
        } catch (e) {
            debugLog("Сбой при инициализации WebRTC: " + e.message, true);
        }

        function pack(obj) {
            const bytes = new TextEncoder().encode(JSON.stringify(obj));
            return btoa(String.fromCharCode.apply(null, bytes)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }

        function unpack(str) {
            str = str.replace(/-/g, '+').replace(/_/g, '/');
            while (str.length % 4) str += '=';
            const binary = atob(str);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            return JSON.parse(new TextDecoder().decode(bytes));
        }

        const urlParams = new URLSearchParams(window.location.search);
        const incomingOffer = urlParams.get('offer');

        if (incomingOffer) {
            debugLog("Обнаружен входящий offer в URL. Запуск в режиме КЛИЕНТА...");
            document.getElementById('setup-panel').classList.add('hidden');
            setTimeout(() => startAsClient(incomingOffer), 500);
        }

        // --- ЛОГИКА ХОСТА ---
        async function startAsHost() {
            debugLog("Нажата кнопка Хоста. Создание оффера...");
            document.getElementById('setup-panel').classList.add('hidden');
            
            try {
                dataChannel = pc.createDataChannel("game-channel");
                setupDataChannel();
                debugChannelState();

                const offer = await pc.createOffer();
                debugLog("Локальный оффер создан. Применение...");
                await pc.setLocalDescription(offer);
                debugLog("Ожидание сбора ICE-кандидатов от STUN...");
            } catch (err) {
                debugLog("Ошибка создания оффера: " + err.message, true);
            }

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    debugLog(`Найден сетевой адрес: ${event.candidate.candidate.substring(0, 30)}...`);
                }
                if (event.candidate === null) {
                    debugLog("Сбор адресов завершен! Формирование ссылки...");
                    try {
                        const compressedOffer = pack(pc.localDescription);
                        const inviteLink = `${window.location.origin}${window.location.pathname}?offer=${compressedOffer}`;
                        
                        document.getElementById('exchange-panel').classList.remove('hidden');
                        document.getElementById('output-link-text').value = inviteLink;
                        document.getElementById('host-input-container').classList.remove('hidden');
                        debugLog("ССЫЛКА СГЕНЕРИРОВАНА И ВЫВЕДЕНА НА ЭКРАН!");
                    } catch(packErr) {
                        debugLog("Ошибка упаковки данных: " + packErr.message, true);
                    }
                }
            };
        }
        function connectToClient() {
            const inputVal = document.getElementById('client-link-input').value.trim();
            if (!inputVal) return alert("Вставьте текст!");
            
            try {
                let answerStr = inputVal;
                if (inputVal.includes('answer=')) {
                    const url = new URL(inputVal);
                    answerStr = url.searchParams.get('answer');
                }
                const answer = unpack(answerStr);
                debugLog("Ответ друга прочитан. Подключение...");
                pc.setRemoteDescription(new RTCSessionDescription(answer));
            } catch(e) {
                debugLog("Ошибка разбора ответа друга: " + e.message, true);
            }
        }

        // --- ЛОГИКА КЛИЕНТА ---
        async function startAsClient(offerStr) {
            pc.ondatachannel = (event) => {
                dataChannel = event.channel;
                setupDataChannel();
                debugChannelState();
            };

            myPlayer.color = '#dc3545';
            enemyPlayer.color = '#007bff';

            try {
                const offer = unpack(offerStr);
                debugLog("Оффер хоста успешно распакован. Применение...");
                await pc.setRemoteDescription(new RTCSessionDescription(offer));
                
                const answer = await pc.createAnswer();
                debugLog("Ответный локальный ансвер создан. Применение...");
                await pc.setLocalDescription(answer);
            } catch (err) {
                debugLog("Ошибка инициализации клиента: " + err.message, true);
            }

            pc.onicecandidate = (event) => {
                if (event.candidate === null) {
                    debugLog("Сбор адресов клиента завершен. Создание ссылки-ответа...");
                    const compressedAnswer = pack(pc.localDescription);
                    const responseLink = `${window.location.origin}${window.location.pathname}?answer=${compressedAnswer}`;
                    
                    document.getElementById('exchange-panel').classList.remove('hidden');
                    document.getElementById('output-link-text').value = responseLink;
                    debugLog("ОТВЕТНАЯ ССЫЛКА ГОТОВА!");
                }
            };
        }

        function setupDataChannel() {
            dataChannel.onopen = () => {
                debugLog("СОЕДИНЕНИЕ УСТАНОВЛЕНО! ИГРА НАЧАЛАСЬ!");
                document.getElementById('exchange-panel').classList.add('hidden');
                enemyPlayer.active = true;
                sendMyPosition();
            };
            dataChannel.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'MOVE') {
                        enemyPlayer.x = data.x;
                        enemyPlayer.y = data.y;
                    }
                } catch(e){}
            };
            dataChannel.onclose = () => {
                debugLog("Соединение закрыто вторым игроком.", true);
                enemyPlayer.active = false;
            };
        }

        function debugChannelState() {
            if(dataChannel) {
                dataChannel.onerror = (err) => debugLog("Ошибка канала данных: " + err.message, true);
            }
        }

        function sendMyPosition() {
            if (dataChannel && dataChannel.readyState === "open") {
                dataChannel.send(JSON.stringify({ type: 'MOVE', x: myPlayer.x, y: myPlayer.y }));
            }
        }

        function moveHandler(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            myPlayer.x = ((clientX - rect.left) / rect.width) * canvas.width - myPlayer.size / 2;
            myPlayer.y = ((clientY - rect.top) / rect.height) * canvas.height - myPlayer.size / 2;
            sendMyPosition();
        }

        canvas.addEventListener('click', (e) => moveHandler(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            moveHandler(touch.clientX, touch.clientY);
        }, { passive: false });

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = myPlayer.color;
            ctx.fillRect(myPlayer.x, myPlayer.y, myPlayer.size, myPlayer.size);
            if (enemyPlayer.active) {
                ctx.fillStyle = enemyPlayer.color;
                ctx.fillRect(enemyPlayer.x, enemyPlayer.y, enemyPlayer.size, enemyPlayer.size);
            }
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
